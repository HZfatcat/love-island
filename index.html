<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>💕 Love Island - 我们的甜蜜小岛</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800;900&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet" />
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <style>
        :root {
            --primary: #19c8b9;
            --primary-hover: #3dd4c6;
            --primary-active: #11a89b;
            --primary-bg: #e6f9f6;
            --text: #794f27;
            --text-body: #725d42;
            --text-secondary: #9f927d;
            --text-muted: #8a7b66;
            --text-disabled: #c4b89e;
            --bg: #f8f8f0;
            --bg-content: rgb(247, 243, 223);
            --bg-disabled: #f0ece2;
            --border: #c4b89e;
            --border-hover: #a89878;
            --border-strong: #9f927d;
            --success: #6fba2c;
            --success-active: #5a9e1e;
            --warning: #f5c31c;
            --warning-active: #dba90e;
            --error: #e05a5a;
            --error-active: #c94444;
            --focus-yellow: #ffcc00;
            --focus-yellow-d: #e0b800;
            --shadow-btn: #bdaea0;
            --shadow-input: #d4c9b4;
            --r-sm: 12px;
            --r-base: 18px;
            --r-lg: 24px;
            --r-pill: 50px;
            --ease: cubic-bezier(0.4, 0, 0.2, 1);
            --pink: #f8a6b2;
            --purple: #b77dee;
            --app-blue: #889df0;
            --app-yellow: #f7cd67;
            --app-teal: #82d5bb;
            --app-green: #8ac68a;
            --app-orange: #e59266;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Nunito', 'Noto Sans SC', -apple-system, 'PingFang SC', sans-serif;
            font-weight: 500; letter-spacing: 0.01em;
            background: var(--bg); color: var(--text-body);
            min-height: 100vh; overflow-x: hidden;
        }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
        .page-bg {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(circle at 10% 20%, rgba(25,200,185,0.06) 0%, transparent 50%),
                        radial-gradient(circle at 90% 80%, rgba(248,166,178,0.08) 0%, transparent 50%);
            pointer-events: none; z-index: 0;
        }
        .floating-hearts {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            pointer-events: none; z-index: 0; overflow: hidden;
        }
        .heart-float {
            position: absolute; font-size: 20px; opacity: 0.15;
            animation: heartFloat 8s ease-in-out infinite;
        }
        .heart-float:nth-child(1) { left: 5%; top: 20%; animation-delay: 0s; font-size: 16px; }
        .heart-float:nth-child(2) { left: 15%; top: 60%; animation-delay: 2s; font-size: 24px; }
        .heart-float:nth-child(3) { left: 85%; top: 30%; animation-delay: 4s; font-size: 18px; }
        .heart-float:nth-child(4) { left: 75%; top: 70%; animation-delay: 1s; font-size: 22px; }
        .heart-float:nth-child(5) { left: 50%; top: 10%; animation-delay: 3s; font-size: 14px; }
        .heart-float:nth-child(6) { left: 30%; top: 80%; animation-delay: 5s; font-size: 20px; }
        .heart-float:nth-child(7) { left: 60%; top: 40%; animation-delay: 6s; font-size: 16px; }
        .heart-float:nth-child(8) { left: 90%; top: 15%; animation-delay: 2.5s; font-size: 12px; }
        @keyframes heartFloat {
            0%, 100% { transform: translateY(0) rotate(0deg); opacity: 0.12; }
            25% { transform: translateY(-20px) rotate(5deg); opacity: 0.2; }
            50% { transform: translateY(-10px) rotate(-3deg); opacity: 0.15; }
            75% { transform: translateY(-25px) rotate(4deg); opacity: 0.18; }
        }
        .app-container { position: relative; z-index: 1; max-width: 1200px; margin: 0 auto; padding: 20px; min-height: 100vh; }

        /* Button */
        .btn { display: inline-flex; align-items: center; justify-content: center; gap: 8px; font-family: inherit; font-weight: 600; letter-spacing: 0.02em; line-height: 1; border: 2px solid transparent; cursor: pointer; transition: all 0.25s var(--ease); text-decoration: none; white-space: nowrap; }
        .btn:focus-visible { outline: 2px solid var(--primary); outline-offset: 2px; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; box-shadow: none !important; }
        .btn-small { height: 32px; padding: 0 16px; font-size: 12px; border-radius: 16px; }
        .btn-middle { height: 45px; padding: 0 20px; font-size: 14px; border-radius: var(--r-pill); }
        .btn-large { height: 48px; padding: 0 32px; font-size: 16px; border-radius: var(--r-lg); }
        .btn-primary { background: var(--bg); color: var(--text); border-color: var(--bg); box-shadow: 0 5px 0 0 var(--shadow-btn); }
        .btn-primary:hover { box-shadow: 0 6px 0 0 var(--shadow-btn); transform: translateY(-1px); }
        .btn-primary:active { box-shadow: 0 1px 0 0 var(--shadow-btn); transform: translateY(2px); }
        .btn-primary-pink { background: var(--pink); color: #fff; border-color: var(--pink); box-shadow: 0 5px 0 0 #d47a8a; }
        .btn-primary-pink:hover { box-shadow: 0 6px 0 0 #d47a8a; transform: translateY(-1px); }
        .btn-primary-pink:active { box-shadow: 0 1px 0 0 #d47a8a; transform: translateY(2px); }
        .btn-primary-teal { background: var(--primary); color: #fff; border-color: var(--primary); box-shadow: 0 5px 0 0 #0ea090; }
        .btn-primary-teal:hover { box-shadow: 0 6px 0 0 #0ea090; transform: translateY(-1px); }
        .btn-primary-teal:active { box-shadow: 0 1px 0 0 #0ea090; transform: translateY(2px); }
        .btn-default { background: var(--bg); color: var(--text-body); border: 2px solid var(--border-strong); box-shadow: 0 2px 4px 0 rgba(61,52,40,0.06); }
        .btn-default:hover { color: var(--primary); border-color: var(--primary); box-shadow: 0 3px 10px 0 rgba(61,52,40,0.10); transform: translateY(-1px); }
        .btn-default:active { color: var(--primary-active); border-color: var(--primary-active); transform: translateY(0); }

        /* Card */
        .card { background: var(--bg-content); border-radius: 20px; padding: 20px 24px; color: var(--text-body); transition: all 0.3s var(--ease); }
        .card-pattern-default {
            background: radial-gradient(circle, rgba(25,200,185,0.12) 1.5px, transparent 1.5px) 0 0 / 28px 28px,
                        radial-gradient(circle, rgba(25,200,185,0.08) 1px, transparent 1px) 7px 7px / 14px 14px,
                        var(--bg-content);
            border: 1.5px solid rgba(25,200,185,0.3);
        }
        .card-pattern-pink {
            background: radial-gradient(circle, rgba(248,166,178,0.18) 1.5px, transparent 1.5px) 0 0 / 28px 28px,
                        radial-gradient(circle, rgba(255,200,210,0.12) 1px, transparent 1px) 7px 7px / 14px 14px,
                        #fde4e8;
            border: 1.5px solid var(--pink); color: #a85565;
        }
        .card-pattern-teal {
            background: radial-gradient(circle, rgba(130,213,187,0.18) 1.5px, transparent 1.5px) 0 0 / 28px 28px,
                        radial-gradient(circle, rgba(160,230,210,0.12) 1px, transparent 1px) 7px 7px / 14px 14px,
                        #e0f5ed;
            border: 1.5px solid var(--app-teal); color: #3a8a72;
        }
        .card-pattern-blue {
            background: radial-gradient(circle, rgba(136,157,240,0.18) 1.5px, transparent 1.5px) 0 0 / 28px 28px,
                        radial-gradient(circle, rgba(180,200,255,0.12) 1px, transparent 1px) 7px 7px / 14px 14px,
                        #e8edfe;
            border: 1.5px solid var(--app-blue); color: #4a5a9e;
        }
        .card-pattern-yellow {
            background: radial-gradient(circle, rgba(247,205,103,0.18) 1.5px, transparent 1.5px) 0 0 / 28px 28px,
                        radial-gradient(circle, rgba(255,220,140,0.12) 1px, transparent 1px) 7px 7px / 14px 14px,
                        #fef5e0;
            border: 1.5px solid var(--app-yellow); color: #8a6a20;
        }
        .card-pattern-purple {
            background: radial-gradient(circle, rgba(183,125,238,0.18) 1.5px, transparent 1.5px) 0 0 / 28px 28px,
                        radial-gradient(circle, rgba(210,170,255,0.12) 1px, transparent 1px) 7px 7px / 14px 14px,
                        #f0e8fe;
            border: 1.5px solid var(--purple); color: #6a3a9e;
        }
        .card-solid-teal { background: var(--app-teal); color: #fff; }
        .card-solid-pink { background: var(--pink); color: #fff; }
        .card-solid-blue { background: var(--app-blue); color: #fff; }

        /* Input */
        .input-wrapper { position: relative; display: flex; align-items: center; background: var(--bg-content); border: 2px solid var(--border); border-radius: var(--r-pill); transition: all 0.25s var(--ease); }
        .input-wrapper:hover { border-color: var(--border-hover); }
        .input-wrapper:focus-within { border-color: var(--focus-yellow); box-shadow: 0 0 0 3px rgba(255,204,0,0.15); }
        .input-wrapper-middle { height: 40px; padding: 0 18px; font-size: 14px; border-radius: var(--r-pill); }
        .input-field { flex: 1; border: none; outline: none; background: transparent; font-family: inherit; font-size: inherit; color: var(--text-body); font-weight: 500; letter-spacing: 0.01em; width: 100%; }
        .input-field::placeholder { color: var(--border); font-weight: 400; }

        /* Textarea */
        .textarea-wrapper { background: var(--bg-content); border: 2px solid var(--border); border-radius: 18px; padding: 14px 18px; transition: all 0.25s var(--ease); }
        .textarea-wrapper:hover { border-color: var(--border-hover); }
        .textarea-wrapper:focus-within { border-color: var(--focus-yellow); box-shadow: 0 0 0 3px rgba(255,204,0,0.15); }
        .textarea-field { width: 100%; border: none; outline: none; background: transparent; font-family: inherit; font-size: 14px; color: var(--text-body); font-weight: 500; letter-spacing: 0.01em; resize: vertical; min-height: 80px; line-height: 1.6; }
        .textarea-field::placeholder { color: var(--border); font-weight: 400; }

        /* Section Title */
        .section-title { display: flex; align-items: center; gap: 12px; font-size: 24px; font-weight: 700; color: var(--text); letter-spacing: 0.02em; margin-bottom: 24px; }
        .section-title::after { content: ''; flex: 1; height: 2px; background: linear-gradient(90deg, var(--border), transparent); }

        /* Nav Bar */
        .nav-bar { display: flex; gap: 8px; margin-bottom: 32px; padding: 6px; background: var(--bg-content); border-radius: 18px; border: 2px solid rgba(25,200,185,0.15); flex-wrap: wrap; overflow: visible; }
        .nav-bar-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; margin-bottom: 32px; border-radius: 18px; }
        .nav-bar-wrap::-webkit-scrollbar { display: none; }
        .nav-btn { padding: 10px 20px; font-size: 14px; font-weight: 600; color: var(--text-secondary); border: none; border-radius: 14px; cursor: pointer; background: transparent; transition: all 0.25s var(--ease); font-family: inherit; letter-spacing: 0.02em; display: flex; align-items: center; gap: 6px; white-space: nowrap; }
        .nav-btn { padding: 10px 20px; font-size: 14px; font-weight: 600; color: var(--text-secondary); border: none; border-radius: 14px; cursor: pointer; background: transparent; transition: all 0.25s var(--ease); font-family: inherit; letter-spacing: 0.02em; display: flex; align-items: center; gap: 6px; }
        .nav-btn:hover { background: rgba(25,200,185,0.08); color: var(--text-body); }
        .nav-btn-active { background: var(--primary); color: #fff; box-shadow: 0 3px 0 0 #0ea090; }

        /* Countdown */
        .countdown-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; text-align: center; }
        .countdown-item { background: var(--bg-content); border-radius: 18px; padding: 16px 8px; border: 2px solid rgba(25,200,185,0.2); }
        .countdown-number { font-size: 36px; font-weight: 900; color: var(--primary); line-height: 1; letter-spacing: 2px; }
        .countdown-label { font-size: 12px; color: var(--text-secondary); font-weight: 600; margin-top: 4px; letter-spacing: 0.02em; }

        /* Anniversary Hero */
        .anniversary-hero {
            background: linear-gradient(135deg, #fde4e8 0%, var(--bg-content) 50%, #e0f5ed 100%);
            border-radius: 24px; padding: 40px; text-align: center;
            border: 2px solid rgba(248,166,178,0.3); position: relative; overflow: hidden;
        }
        .anniversary-hero::before { content: '💕'; position: absolute; top: -10px; left: -10px; font-size: 60px; opacity: 0.1; transform: rotate(-15deg); }
        .anniversary-hero::after { content: '💕'; position: absolute; bottom: -10px; right: -10px; font-size: 60px; opacity: 0.1; transform: rotate(15deg); }
        .anniversary-hearts { font-size: 48px; margin-bottom: 12px; animation: floatHearts 2s ease-in-out infinite; }
        @keyframes floatHearts { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
        .anniversary-title { font-size: 28px; font-weight: 700; color: var(--text); margin-bottom: 8px; }
        .anniversary-sub { font-size: 16px; color: var(--text-secondary); margin-bottom: 20px; }
        .anniversary-days { font-size: 64px; font-weight: 900; color: var(--primary); letter-spacing: 4px; line-height: 1; }
        .anniversary-days-label { font-size: 16px; color: var(--text-muted); font-weight: 600; margin-top: 4px; }

        /* Mood Selector */
        .mood-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; }
        .mood-btn { display: flex; flex-direction: column; align-items: center; gap: 4px; padding: 12px 8px; border: 2px solid var(--border); border-radius: 16px; background: var(--bg); cursor: pointer; transition: all 0.25s var(--ease); font-family: inherit; }
        .mood-btn:hover { border-color: var(--primary); transform: translateY(-2px); }
        .mood-btn-active { border-color: var(--primary); background: var(--primary-bg); box-shadow: 0 0 0 3px rgba(25,200,185,0.15); }
        .mood-emoji { font-size: 28px; }
        .mood-label { font-size: 11px; font-weight: 600; color: var(--text-secondary); }

        /* Journal */
        .journal-list { display: flex; flex-direction: column; gap: 16px; }
        .journal-entry { background: var(--bg-content); border-radius: 18px; padding: 20px 24px; border-left: 4px solid var(--primary); transition: all 0.3s var(--ease); }
        .journal-entry:hover { transform: translateY(-2px); box-shadow: 0 4px 16px rgba(61,52,40,0.08); }
        .journal-entry-pink { border-left-color: var(--pink); }
        .journal-entry-blue { border-left-color: var(--app-blue); }
        .journal-entry-teal { border-left-color: var(--app-teal); }
        .journal-entry-purple { border-left-color: var(--purple); }
        .journal-entry-yellow { border-left-color: var(--app-yellow); }
        .journal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .journal-date { font-size: 12px; color: var(--text-secondary); font-weight: 600; }
        .journal-mood { font-size: 18px; }
        .journal-title { font-size: 16px; font-weight: 700; color: var(--text); margin-bottom: 6px; }
        .journal-text { font-size: 14px; line-height: 1.7; color: var(--text-body); }
        .journal-actions { display: flex; gap: 6px; flex-shrink: 0; }
        .action-btn { background: none; border: none; cursor: pointer; font-size: 14px; padding: 4px 6px; border-radius: 8px; transition: all 0.2s var(--ease); color: var(--text-secondary); font-family: inherit; opacity: 0; }
        .journal-entry:hover .action-btn { opacity: 1; }
        .wish-item:hover .action-btn { opacity: 1; }
        .date-item:hover .action-btn { opacity: 1; }
        .action-btn:hover { background: rgba(114,93,66,0.1); color: var(--text-body); }
        .action-btn-danger:hover { background: rgba(224,90,90,0.12); color: var(--error); }
        .name-editable { cursor: pointer; transition: all 0.2s var(--ease); display: inline-flex; align-items: center; gap: 4px; }
        .name-editable:hover { color: var(--primary); }

        /* Wish List */
        .wish-list { display: flex; flex-direction: column; gap: 12px; }
        .wish-item { display: flex; align-items: center; gap: 14px; background: var(--bg-content); border-radius: 16px; padding: 14px 20px; transition: all 0.3s var(--ease); }
        .wish-item:hover { transform: translateY(-2px); box-shadow: 0 3px 12px rgba(61,52,40,0.06); }
        .wish-checkbox { width: 24px; height: 24px; border-radius: 8px; border: 2.5px solid var(--border); background: var(--bg); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s var(--ease); flex-shrink: 0; }
        .wish-checkbox:hover { border-color: var(--primary); }
        .wish-checkbox-checked { background: var(--primary); border-color: var(--primary-active); }
        .wish-checkbox-checked::after { content: '✓'; color: #fff; font-size: 14px; font-weight: 700; }
        .wish-info { flex: 1; }
        .wish-title { font-size: 15px; font-weight: 600; color: var(--text); }
        .wish-title-done { text-decoration: line-through; color: var(--text-disabled); }
        .wish-desc { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }
        .wish-heart { font-size: 18px; opacity: 0.5; transition: all 0.3s var(--ease); cursor: pointer; }
        .wish-heart-liked { opacity: 1; animation: heartBeat 0.3s var(--ease); }
        @keyframes heartBeat { 0% { transform: scale(1); } 50% { transform: scale(1.3); } 100% { transform: scale(1); } }

        /* Gallery */
        .gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 16px; }
        .gallery-item { background: var(--bg-content); border-radius: 18px; overflow: hidden; aspect-ratio: 1; display: flex; align-items: center; justify-content: center; font-size: 48px; border: 2px solid transparent; transition: all 0.3s var(--ease); position: relative; }
        .gallery-item:hover { transform: translateY(-3px); border-color: var(--primary); box-shadow: 0 6px 20px rgba(61,52,40,0.1); }
        .gallery-item-label { position: absolute; bottom: 0; left: 0; right: 0; padding: 8px 12px; background: linear-gradient(transparent, rgba(0,0,0,0.3)); color: #fff; font-size: 12px; font-weight: 600; text-align: center; }

        /* Timeline */
        .timeline { position: relative; padding-left: 30px; }
        .timeline::before { content: ''; position: absolute; left: 10px; top: 0; bottom: 0; width: 2px; background: var(--border); }
        .timeline-item { position: relative; margin-bottom: 20px; padding: 16px 20px; background: var(--bg-content); border-radius: 16px; transition: all 0.3s var(--ease); }
        .timeline-item:hover { transform: translateY(-2px); box-shadow: 0 4px 16px rgba(61,52,40,0.08); }
        .timeline-item::before { content: ''; position: absolute; left: -24px; top: 20px; width: 12px; height: 12px; border-radius: 50%; border: 2px solid var(--primary); background: var(--bg); }
        .timeline-item-diary::before { border-color: var(--primary); background: var(--primary); }
        .timeline-item-wish::before { border-color: var(--pink); background: var(--pink); }
        .timeline-item-photo::before { border-color: var(--app-blue); background: var(--app-blue); }
        .timeline-item-fight::before { border-color: var(--error); background: var(--error); }
        .timeline-date { font-size: 11px; color: var(--text-secondary); font-weight: 600; margin-bottom: 4px; }
        .timeline-icon { font-size: 16px; margin-right: 6px; }
        .timeline-title { font-size: 14px; font-weight: 700; color: var(--text); }
        .timeline-desc { font-size: 13px; color: var(--text-body); margin-top: 4px; line-height: 1.5; }

        /* Dates */
        .date-list { display: flex; flex-direction: column; gap: 12px; }
        .date-item { display: flex; align-items: center; gap: 16px; background: var(--bg-content); border-radius: 16px; padding: 14px 20px; transition: all 0.3s var(--ease); }
        .date-item:hover { transform: translateY(-2px); box-shadow: 0 3px 12px rgba(61,52,40,0.06); }
        .date-icon { width: 48px; height: 48px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; flex-shrink: 0; }
        .date-icon-pink { background: #fde4e8; }
        .date-icon-teal { background: #e0f5ed; }
        .date-icon-blue { background: #e8edfe; }
        .date-icon-yellow { background: #fef5e0; }
        .date-icon-purple { background: #f0e8fe; }
        .date-info { flex: 1; }
        .date-name { font-size: 15px; font-weight: 700; color: var(--text); }
        .date-value { font-size: 13px; color: var(--text-secondary); }
        .date-days { font-size: 13px; font-weight: 700; color: var(--primary); }

        /* Message Board */
        .message-board { display: flex; flex-direction: column; gap: 14px; }
        .message-bubble { background: var(--bg-content); border-radius: 18px; padding: 16px 20px; max-width: 80%; }
        .message-bubble-self { align-self: flex-end; background: var(--primary-bg); border: 1.5px solid rgba(25,200,185,0.2); }
        .message-bubble-other { align-self: flex-start; border: 1.5px solid rgba(248,166,178,0.2); }
        .message-sender { font-size: 12px; font-weight: 700; color: var(--text); margin-bottom: 4px; }
        .message-text { font-size: 14px; line-height: 1.6; }
        .message-time { font-size: 11px; color: var(--text-disabled); margin-top: 4px; text-align: right; }
        .message-bubble:hover .msg-action-btn { opacity: 1; }
        .msg-action-btn { opacity: 0; background: none; border: none; cursor: pointer; font-size: 12px; padding: 2px 5px; border-radius: 6px; transition: all 0.2s var(--ease); color: var(--text-secondary); font-family: inherit; }
        .msg-action-btn:hover { background: rgba(114,93,66,0.1); color: var(--text-body); }

        /* Fight Records */
        .fight-list { display: flex; flex-direction: column; gap: 14px; }
        .fight-entry { background: var(--bg-content); border-radius: 18px; padding: 20px 24px; border-left: 4px solid var(--error); transition: all 0.3s var(--ease); }
        .fight-entry:hover { transform: translateY(-2px); box-shadow: 0 4px 16px rgba(61,52,40,0.08); }
        .fight-entry-resolved { border-left-color: var(--success); opacity: 0.7; }

            var raw = localStorage.getItem('love_island_' + key);

                var parsed = JSON.parse(raw);
                if (key === 'specialDates') {
                    parsed.forEach(function(d) { if (d.date) d.date = new Date(d.date); });
                }
                return parsed;
            }
        } catch(e) {}
        return fallback;
    }

        if (CLOUD_SYNCING[key]) return;
        uploadToCloud();

        });
        return result;

        if (!GITHUB_TOKEN) return;
        var data = getAllData();
        var content = btoa(unescape(encodeURIComponent(JSON.stringify(data, null, 2))));
        fetch(GITHUB_DATA_URL, {
            headers: { 'Authorization': 'token ' + GITHUB_TOKEN, 'Accept': 'application/vnd.github.v3+json' }

            var sha = res.sha || '';

        // ====== 日历 ======
        function renderCalendar() {
            var now = new Date();
            var today = { y: now.getFullYear(), m: now.getMonth(), d: now.getDate() };
            var firstDay = new Date(calYear, calMonth, 1).getDay();
            var daysInMonth = new Date(calYear, calMonth + 1, 0).getDate();
            var daysInPrev = new Date(calYear, calMonth, 0).getDate();
            var weekdays = ['日', '一', '二', '三', '四', '五', '六'];
            var monthNames = ['1月', '2月', '3月', '4月', '5月', '6月', '7月', '8月', '9月', '10月', '11月', '12月'];

            // 收集需要标记的日期
            function dateKey(y, m, d) { return y + '-' + String(m+1).padStart(2,'0') + '-' + String(d).padStart(2,'0'); }
            var marks = {};
            var markInfo = {}; // 存储点击详情
            // 在一起的日子
            var ls = loveStart;
            marks[dateKey(ls.getFullYear(), ls.getMonth(), ls.getDate())] = 'love';
            // 上次见面
            var sd = separateDate;
            marks[dateKey(sd.getFullYear(), sd.getMonth(), sd.getDate())] = 'separate';
            // 下次见面
            var nm = nextMeetDate;
            marks[dateKey(nm.getFullYear(), nm.getMonth(), nm.getDate())] = 'meet';
            // 特殊纪念日
            specialDates.forEach(function(d) {
                var targetDate = d.date;
                // 如果 isLunar，计算当年的农历生日公历日期
                if (d.isLunar) {
                    var lunar = solarToLunar(d.date);
                    if (lunar) {
                        // 用农历月日计算今年的公历日期
                        var thisYearSolar = getLunarBirthdaySolar(lunar.month, lunar.day, lunar.isLeap, calYear);
                        if (thisYearSolar) {
                            targetDate = thisYearSolar;
                        }
                    }
                }
                // 农历生日需要映射到公历
                var k = dateKey(targetDate.getFullYear(), targetDate.getMonth(), targetDate.getDate());
                if (!marks[k]) marks[k] = 'special';
                // 如果还没到今年，也标记下一年
                if (targetDate.getFullYear() === calYear - 1) {
                    var nextDate = new Date(targetDate);
                    nextDate.setFullYear(calYear);
                    var k2 = dateKey(nextDate.getFullYear(), nextDate.getMonth(), nextDate.getDate());
                    if (!marks[k2]) marks[k2] = 'special';
                }
            });
            // 标记日记日期
            journalEntries.forEach(function(e) {
                var parts = e.date.split('-');
                var k = dateKey(parseInt(parts[0]), parseInt(parts[1]) - 1, parseInt(parts[2]));
                if (!marks[k]) marks[k] = 'diary';
                if (!markInfo[k]) markInfo[k] = [];
                markInfo[k].push({ type: 'diary', icon: '📖', title: e.title, mood: e.mood });
            });
            // 标记已完成心愿
            wishes.filter(function(w) { return w.done; }).forEach(function(w) {
                // 用心愿 id 的哈希作为"完成日"的近似，实际上我们不知道完成日期
                // 简单起见，不特定标记日期，但会在点击日记时关联显示
            });

            // 计算统计
            var togetherDays = Math.floor((separateDate - loveStart) / (1000*60*60*24));
            if (togetherDays < 0) togetherDays = 0;
            var apartDays = Math.floor((now - separateDate) / (1000*60*60*24));
            if (apartDays < 0) apartDays = 0;
            var meetCountdown = Math.ceil((nextMeetDate - now) / (1000*60*60*24));
            if (meetCountdown < 0) meetCountdown = 0;

            // 构建日历格子
            var cells = [];
            for (var i = firstDay - 1; i >= 0; i--) {
                var d = daysInPrev - i;
                cells.push({ day: d, other: true });
            }
            for (var i = 1; i <= daysInMonth; i++) {
                cells.push({ day: i, other: false, today: calYear === today.y && calMonth === today.m && i === today.d });
            }
            var remaining = 42 - cells.length;
            for (var i = 1; i <= remaining; i++) {
                cells.push({ day: i, other: true });
            }

            // 预计算农历文本
            function getLunarText(y, m, d) {
                var dt = new Date(y, m, d);
                var lunar = solarToLunar(dt);
                if (!lunar) return '';
                var cnDays = ['初一','初二','初三','初四','初五','初六','初七','初八','初九','初十',
                    '十一','十二','十三','十四','十五','十六','十七','十八','十九','二十',
                    '廿一','廿二','廿三','廿四','廿五','廿六','廿七','廿八','廿九','三十'];
                return cnDays[lunar.day - 1] || '';
            }

            // 获取指定日期的标记名称
            function getMarkName(k) {
                if (marks[k] === 'love') return '💕 在一起的日子';
                if (marks[k] === 'separate') return '🚉 上次见面';
                if (marks[k] === 'meet') return '💞 下次见面 🎉';
                if (marks[k] === 'special') {
                    for (var si = 0; si < specialDates.length; si++) {
                        var sd = specialDates[si];
                        var dk = dateKey(calYear, sd.date.getMonth(), sd.date.getDate());
                        if (dk === k) return sd.icon + ' ' + sd.name;
                    }
                }
                return '';
            }

            // 查找当天的日记
            function getDiaryForDate(y, m, d) {
                var ds = y + '-' + String(m+1).padStart(2,'0') + '-' + String(d).padStart(2,'0');
                for (var di = 0; di < journalEntries.length; di++) {
                    if (journalEntries[di].date === ds) return journalEntries[di];
                }
                return null;
            }

            return h('div', { className: 'calendar-wrap' },
                // 统计
                h('div', { className: 'calendar-stats' },
                    h('div', { className: 'calendar-stat', style: { background: '#fde4e8' } },
                        h('div', { className: 'calendar-stat-num', style: { color: 'var(--pink)' } }, String(togetherDays)),
                        h('div', { className: 'calendar-stat-label' }, '已在一起')
                    ),
                    h('div', { className: 'calendar-stat', style: { background: '#fde4e8' } },
                        h('div', { className: 'calendar-stat-num', style: { color: 'var(--error)' } }, String(apartDays)),
                        h('div', { className: 'calendar-stat-label' }, '已分开')
                    ),
                    h('div', { className: 'calendar-stat', style: { background: '#e0f5ed' } },
                        h('div', { className: 'calendar-stat-num', style: { color: 'var(--success)' } }, String(meetCountdown)),
                        h('div', { className: 'calendar-stat-label' }, '距下次见面')
                    )
                ),
                // 日历头部（含年份输入）
                h('div', { className: 'calendar-header' },
                    h('div', { className: 'calendar-month' },
                        h('input', {
                            type: 'number',
                            value: calYear,
                            onChange: function(e) { var v = parseInt(e.target.value); if (v >= 2026) { setCalYear(v); } },
                            style: { width: 60, border: 'none', background: 'transparent', fontFamily: 'inherit', fontSize: 18, fontWeight: 700, color: 'var(--text)', outline: 'none', borderBottom: '2px dashed var(--border)' }
                        }),
                        '年 ' + monthNames[calMonth]
                    ),
                    h('div', { className: 'calendar-nav' },
                        h('button', { className: 'calendar-nav-btn', onClick: function() { if (calMonth === 0) { if (calYear > 2026) { setCalMonth(11); setCalYear(calYear - 1); } } else { setCalMonth(calMonth - 1); } } }, '‹'),
                        h('button', { className: 'calendar-nav-btn', onClick: function() { var d = new Date(); setCalMonth(d.getMonth()); setCalYear(d.getFullYear()); } }, '📅'),
                        h('button', { className: 'calendar-nav-btn', onClick: function() { if (calMonth === 11) { setCalMonth(0); setCalYear(calYear + 1); } else { setCalMonth(calMonth + 1); } } }, '›')
                    )
                ),
                // 星期
                h('div', { className: 'calendar-grid' },
                    weekdays.map(function(w) { return h('div', { className: 'calendar-weekday', key: w }, w); }),
                    cells.map(function(cell, idx) {
                        var key = dateKey(calYear, calMonth, cell.day);
                        var mk = marks[key];
                        if (cell.other) {
                            var otherKey = cell.day > 15
                                ? dateKey(calMonth === 0 ? calYear - 1 : calYear, calMonth === 0 ? 11 : calMonth - 1, cell.day)
                                : dateKey(calMonth === 11 ? calYear + 1 : calYear, calMonth === 11 ? 0 : calMonth + 1, cell.day);
                            mk = marks[otherKey];
                        }
                        var cls = 'calendar-day';
                        if (cell.other) cls += ' calendar-day-other';
                        if (cell.today) cls += ' calendar-day-today';
                        if (mk === 'love') cls += ' calendar-day-love';
                        else if (mk === 'separate') cls += ' calendar-day-separate';
                        else if (mk === 'meet') cls += ' calendar-day-meet';
                        else if (mk === 'special') cls += ' calendar-day-special';
                        else if (mk === 'diary') cls += ' calendar-day-diary';
                        // 农历小字
                        var lunarTxt = getLunarText(calYear, calMonth, cell.day);
                        var markName = getMarkName(key);
                        var diaryEntry = getDiaryForDate(calYear, calMonth, cell.day);
                        var extraInfo = markInfo[key] || [];
                        var hasExtra = extraInfo.length > 0 || diaryEntry;
                        return h('div', {
                            className: cls + (hasExtra ? ' calendar-day-mark' : ''),
                            key: idx,
                            onClick: function(k, mn, de, ei) { return function() { setCalPopup(k ? { key: k, name: mn, diary: de, extra: ei } : null); }; }(markName || key, markName, diaryEntry, extraInfo),
                            style: markName || hasExtra ? { cursor: 'pointer' } : {},
                            title: (markName || '') + (diaryEntry ? ' 📖 ' + diaryEntry.title : '') + (extraInfo.length > 0 ? ' 📝 ' + extraInfo.length + '条记录' : '')
                        },
                            h('div', { style: { fontSize: 14, fontWeight: cell.today ? 900 : 600 } }, String(cell.day)),
                            lunarTxt ? h('div', { style: { fontSize: 9, opacity: 0.55, lineHeight: 1.1 } }, lunarTxt) : null
                        );
                    })
                ),
                // 点击日期弹出详情
                calPopup ? h('div', { style: { marginTop: 12, padding: '12px 16px', borderRadius: 14, background: 'var(--bg)', border: '1.5px solid var(--border)' } },
                    calPopup.name ? h('div', { style: { fontSize: 14, fontWeight: 700, color: 'var(--text)', marginBottom: 4 } }, calPopup.name) : null,
                    calPopup.diary ? h('div', { style: { fontSize: 13, color: 'var(--text-secondary)', marginBottom: 4 } },
                        '📖 ' + calPopup.diary.title + ' · ' + calPopup.diary.date

                    h('div', { style: { display: 'flex', gap: 8 } },
                        h('button', { className: 'btn btn-small ' + (editingDate && editingDate.isLunar ? 'btn-primary-teal' : 'btn-default'), onClick: function() { if (editingDate) setEditingDate(Object.assign({}, editingDate, { isLunar: true })); } }, '🌙 农历'),
                        h('button', { className: 'btn btn-small ' + (editingDate && !editingDate.isLunar ? 'btn-primary-teal' : 'btn-default'), onClick: function() { if (editingDate) setEditingDate(Object.assign({}, editingDate, { isLunar: false })); } }, '☀️ 公历')
                    ),
                    editingDate && editingDate.isLunar && editingDate.dateStr ? h('div', { style: { fontSize: 12, color: 'var(--text-secondary)', marginTop: 4 } },
                        '🌙 农历 ' + getLunarDateStr(new Date(editingDate.dateStr))
                    ) : null
                ),
                h('div', { style: { marginBottom: 16 } },
                    h('label', { style: { fontSize: 14, fontWeight: 600, color: 'var(--text)', marginBottom: 6, display: 'block' } }, '图标'),
                    h('div', { className: 'input-wrapper input-wrapper-middle' },
                        h('input', { className: 'input-field', value: editingDate ? editingDate.icon : '', onChange: function(e) { if (editingDate) setEditingDate(Object.assign({}, editingDate, { icon: e.target.value })); }, placeholder: '💕 🎂 💍 🎄 🎆' })
                    )
                ),
                h('div', { style: { marginBottom: 16 } },
                    h('label', { style: { fontSize: 14, fontWeight: 600, color: 'var(--text)', marginBottom: 6, display: 'block' } }, '颜色'),
                    h('div', { style: { display: 'flex', gap: 6, flexWrap: 'wrap' } },
                        ['pink','teal','blue','purple','yellow'].map(function(c) {
                            return h('button', {
                                key: c,
                                className: 'mood-btn' + (editingDate && editingDate.color === c ? ' mood-btn-active' : ''),
                                onClick: function() { if (editingDate) setEditingDate(Object.assign({}, editingDate, { color: c })); },
                                style: { padding: '6px 12px', fontSize: 12 },
                            }, c);
                        })
                    )
                )
            ),
            // 新增吵架 Modal
            h(Modal, { show: showFight, title: '😤 记录吵架', onClose: function() { setShowFight(false); }, onConfirm: addFight, confirmText: '记录 📝', confirmClass: 'btn-primary' },
                h('div', { style: { marginBottom: 16 } },
                    h('label', { style: { fontSize: 14, fontWeight: 600, color: 'var(--text)', marginBottom: 6, display: 'block' } }, '吵架原因'),
                    h('div', { className: 'input-wrapper input-wrapper-middle' },
                        h('input', { className: 'input-field', placeholder: '为什么吵架？', value: newFight.title, onChange: function(e) { setNewFight(Object.assign({}, newFight, { title: e.target.value })); } })
                    )
                ),
                h('div', { style: { marginBottom: 16 } },
                    h('label', { style: { fontSize: 14, fontWeight: 600, color: 'var(--text)', marginBottom: 6, display: 'block' } }, '详细经过'),
                    h('div', { className: 'textarea-wrapper' },
                        h('textarea', { className: 'textarea-field', placeholder: '发生了什么？各自的想法是什么？', value: newFight.reason, onChange: function(e) { setNewFight(Object.assign({}, newFight, { reason: e.target.value })); }, style: { minHeight: 100 } })
                    )
                ),
                h('div', { style: { marginBottom: 16 } },
                    h('label', { style: { fontSize: 14, fontWeight: 600, color: 'var(--text)', marginBottom: 6, display: 'block' } }, '下一步行动（如何解决）'),
                    h('div', { className: 'textarea-wrapper' },
                        h('textarea', { className: 'textarea-field', placeholder: '双方约定怎么做来避免下次再吵？', value: newFight.nextStep, onChange: function(e) { setNewFight(Object.assign({}, newFight, { nextStep: e.target.value })); }, style: { minHeight: 80 } })
                    )
                )
            ),
            // 编辑吵架 Modal
            h(Modal, { show: showEditFight, title: '📝 编辑吵架记录', onClose: function() { setShowEditFight(false); }, onConfirm: saveEditFight, confirmText: '保存修改 💾', confirmClass: 'btn-primary-teal' },
                h('div', { style: { marginBottom: 16 } },
                    h('label', { style: { fontSize: 14, fontWeight: 600, color: 'var(--text)', marginBottom: 6, display: 'block' } }, '吵架原因'),
                    h('div', { className: 'input-wrapper input-wrapper-middle' },
                        h('input', { className: 'input-field', value: editingFight ? editingFight.title : '', onChange: function(e) { if (editingFight) setEditingFight(Object.assign({}, editingFight, { title: e.target.value })); } })
                    )
                ),
                h('div', { style: { marginBottom: 16 } },
                    h('label', { style: { fontSize: 14, fontWeight: 600, color: 'var(--text)', marginBottom: 6, display: 'block' } }, '详细经过'),
                    h('div', { className: 'textarea-wrapper' },
                        h('textarea', { className: 'textarea-field', value: editingFight ? editingFight.reason : '', onChange: function(e) { if (editingFight) setEditingFight(Object.assign({}, editingFight, { reason: e.target.value })); }, style: { minHeight: 100 } })
                    )
                ),
                h('div', { style: { marginBottom: 16 } },
                    h('label', { style: { fontSize: 14, fontWeight: 600, color: 'var(--text)', marginBottom: 6, display: 'block' } }, '下一步行动'),
                    h('div', { className: 'textarea-wrapper' },
                        h('textarea', { className: 'textarea-field', value: editingFight ? editingFight.nextStep : '', onChange: function(e) { if (editingFight) setEditingFight(Object.assign({}, editingFight, { nextStep: e.target.value })); }, style: { minHeight: 80 } })
                    )
                )
            ),
            // 修改认识日期 Modal
            h(Modal, { show: showMeetDateEdit, title: '🤝 修改认识日期', onClose: function() { setShowMeetDateEdit(false); }, onConfirm: saveMeetDate, confirmText: '保存 💾', confirmClass: 'btn-primary-teal' },
                h('div', { style: { marginBottom: 16 } },
                    h('label', { style: { fontSize: 14, fontWeight: 600, color: 'var(--text)', marginBottom: 6, display: 'block' } }, '选择你们认识的日期'),
                    h('div', { className: 'input-wrapper input-wrapper-middle' },
                        h('input', { className: 'input-field', type: 'date', value: editMeetDate, onChange: function(e) { setEditMeetDate(e.target.value); } })
                    )
                )
            ),
            // 修改第一次见面日期 Modal
            h(Modal, { show: showFirstDateEdit, title: '💑 修改第一次见面日期', onClose: function() { setShowFirstDateEdit(false); }, onConfirm: saveFirstDate, confirmText: '保存 💾', confirmClass: 'btn-primary-teal' },
                h('div', { style: { marginBottom: 16 } },
                    h('label', { style: { fontSize: 14, fontWeight: 600, color: 'var(--text)', marginBottom: 6, display: 'block' } }, '选择第一次见面的日期'),
                    h('div', { className: 'input-wrapper input-wrapper-middle' },
                        h('input', { className: 'input-field', type: 'date', value: editFirstDate, onChange: function(e) { setEditFirstDate(e.target.value); } })
                    )
                )
            ),
            // 编辑留言 Modal
            h(Modal, { show: showEditMsg, title: '✏️ 编辑留言', onClose: function() { setShowEditMsg(false); }, onConfirm: saveEditMessage, confirmText: '保存修改 💾', confirmClass: 'btn-primary-teal' },
                h('div', { style: { marginBottom: 16 } },
                    h('label', { style: { fontSize: 14, fontWeight: 600, color: 'var(--text)', marginBottom: 6, display: 'block' } }, '留言内容'),
                    h('div', { className: 'textarea-wrapper' },
                        h('textarea', { className: 'textarea-field', value: editingMsg ? editingMsg.text : '', onChange: function(e) { if (editingMsg) setEditingMsg(Object.assign({}, editingMsg, { text: e.target.value })); }, style: { minHeight: 80 } })
                    )
                )
            ),
            // 修改上次见面日期 Modal
            h(Modal, { show: showSeparateDateEdit, title: '🚉 修改上次见面日期', onClose: function() { setShowSeparateDateEdit(false); }, onConfirm: saveSeparateDate, confirmText: '保存 💾', confirmClass: 'btn-primary-teal' },
                h('div', { style: { marginBottom: 16 } },
                    h('label', { style: { fontSize: 14, fontWeight: 600, color: 'var(--text)', marginBottom: 6, display: 'block' } }, '选择上一次分开的日期'),
                    h('div', { className: 'input-wrapper input-wrapper-middle' },
                        h('input', { className: 'input-field', type: 'date', value: editSeparateDate, onChange: function(e) { setEditSeparateDate(e.target.value); } })
                    )
                )
            ),
            // 修改下次见面日期 Modal
            h(Modal, { show: showNextMeetDateEdit, title: '💞 修改下次见面日期', onClose: function() { setShowNextMeetDateEdit(false); }, onConfirm: saveNextMeetDate, confirmText: '保存 💾', confirmClass: 'btn-primary-teal' },
                h('div', { style: { marginBottom: 16 } },
                    h('label', { style: { fontSize: 14, fontWeight: 600, color: 'var(--text)', marginBottom: 6, display: 'block' } }, '选择下一次见面的日期'),
                    h('div', { className: 'input-wrapper input-wrapper-middle' },
                        h('input', { className: 'input-field', type: 'date', value: editNextMeetDate, onChange: function(e) { setEditNextMeetDate(e.target.value); } })
                    )
                )
            ),
            // 设置 GitHub Token Modal
            h(Modal, { show: showTokenInput, title: '🔑 设置云端同步', onClose: function() { setShowTokenInput(false); }, onConfirm: saveToken, confirmText: '保存并同步 💾', confirmClass: 'btn-primary-teal' },
                h('div', { style: { marginBottom: 16 } },
                    h('label', { style: { fontSize: 14, fontWeight: 600, color: 'var(--text)', marginBottom: 6, display: 'block' } }, 'GitHub 个人访问令牌'),
                    h('div', { className: 'input-wrapper input-wrapper-middle' },
                        h('input', { className: 'input-field', value: editToken, onChange: function(e) { setEditToken(e.target.value); }, placeholder: 'ghp_xxxxxxxxxxxxxxxxxxxx' })
                    ),
                    h('div', { style: { fontSize: 12, color: 'var(--text-secondary)', marginTop: 8, lineHeight: 1.6 } },
                        '令牌保存在你的浏览器中，不会上传到代码里。',
                        h('br'),
                        '两人使用同一个令牌即可同步数据。'
                    )
                )
            )
        );
    }

    // ====== 挂载 ======
    document.addEventListener('DOMContentLoaded', function() {
        var root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(h(App));
    });
    </script>
</body>
</html>
